name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build site
        run: npm run build
        env:
          # Auto-detected by configure-pages (e.g. "/ShobhaDigial" for a project
          # page). Override with a repo variable BASE_PATH = "/" once a custom
          # domain is attached. SITE_URL falls back to the github.io origin.
          BASE_PATH: ${{ vars.BASE_PATH || steps.pages.outputs.base_path }}
          SITE_URL: ${{ vars.SITE_URL || steps.pages.outputs.origin }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
